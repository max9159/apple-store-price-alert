name: Monitor Apple Refurbished Mac Studio

on:
  workflow_dispatch:
  schedule:
    - cron: "7 * * * *"

permissions:
  contents: write

concurrency:
  group: apple-store-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Load persisted state
        shell: bash
        run: |
          mkdir -p state
          git fetch origin monitor-state || true
          if git show-ref --verify --quiet refs/remotes/origin/monitor-state; then
            for file in monitor-state.json latest.json latest.md; do
              git show "origin/monitor-state:state/$file" > "state/$file" || true
            done
          fi

      - name: Run tests
        run: npm test

      - name: Run monitor
        id: monitor
        run: npm run monitor

      - name: Publish workflow summary
        shell: bash
        run: |
          cat state/latest.md >> "$GITHUB_STEP_SUMMARY"

      - name: Persist state branch
        shell: bash
        run: |
          temp_dir="$(mktemp -d)"
          cleanup() {
            git worktree remove --force "$temp_dir" 2>/dev/null || true
          }
          trap cleanup EXIT

          if git show-ref --verify --quiet refs/remotes/origin/monitor-state; then
            git worktree add --detach "$temp_dir" origin/monitor-state
            (
              cd "$temp_dir"
              git switch -C monitor-state
            )
          else
            git worktree add --detach "$temp_dir"
            (
              cd "$temp_dir"
              git checkout --orphan monitor-state
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          mkdir -p "$temp_dir/state"
          cp state/monitor-state.json "$temp_dir/state/monitor-state.json"
          cp state/latest.json "$temp_dir/state/latest.json"
          cp state/latest.md "$temp_dir/state/latest.md"
          printf '%s\n' '# Monitor State' '' 'Generated by the Apple Refurbished Mac Studio workflow.' > "$temp_dir/README.md"

          (
            cd "$temp_dir"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md state
            if git diff --cached --quiet; then
              echo "No state changes to commit."
            else
              git commit -m "Update monitor state"
              git push origin HEAD:monitor-state
            fi
          )

      - name: Send Telegram report
        if: steps.monitor.outputs.should_notify == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run telegram
